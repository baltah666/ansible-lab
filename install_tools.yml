- name: Prepare all Linux nodes
  hosts: linux_nodes
  become: yes
  gather_facts: no

  tasks:

  - name: Update package cache
    apt:
      update_cache: yes

  - name: Install network troubleshooting tools
    apt:
      name:
        -  openssh-server
        - iproute2
        - iputils-ping
        - nano
        - wget
        - tcpdump
        - dnsutils
        - net-tools
        - iperf3
        - traceroute
        - nmap
        - snmp
        - snmpd
        - python3
        - python3-pip
      state: present
